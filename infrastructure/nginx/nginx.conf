server {
    listen 3000;

    # Use Docker's internal DNS resolver to force re-resolution on every request
    # This ensures Docker Swarm's VIP distributes traffic across all API Gateway replicas
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $api_gateway "api-gateway:3000";
        proxy_pass http://$api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        set $api_gateway_health "api-gateway:3000";
        proxy_pass http://$api_gateway_health/orders/health;
        proxy_set_header Host $host;
    }
}
