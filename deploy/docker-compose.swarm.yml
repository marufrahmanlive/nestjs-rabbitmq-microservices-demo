version: "3.8"

services:
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: microservices-demo
    ports:
      - target: 27017
        published: 27017
        mode: host
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - target: 5672
        published: 5672
        mode: host
      - target: 15672
        published: 15672
        mode: host
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - backend

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    image: microservices/api-gateway:latest
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PORT: "3000"
      SERVICE_NAME: api-gateway
    depends_on:
      - rabbitmq
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - backend

  order-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    image: microservices/order-service:latest
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: order-service
    depends_on:
      - rabbitmq
      - mongodb
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - backend

  payment-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    image: microservices/payment-service:latest
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: payment-service
    depends_on:
      - rabbitmq
      - mongodb
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - backend

  notification-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    image: microservices/notification-service:latest
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: notification-service
    depends_on:
      - rabbitmq
      - mongodb
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - target: 3000
        published: 3000
        mode: host
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - api-gateway
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - backend

configs:
  nginx_config:
    file: ../infrastructure/nginx/nginx.conf

volumes:
  mongo_data:

networks:
  backend:
    driver: overlay
    attachable: true
