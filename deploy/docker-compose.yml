version: "3.8"

# =============================================================================
# docker compose up -d --scale api-gateway=3 --scale order-service=3 --scale payment-service=3 --scale notification-service=3
# =============================================================================

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: microservices-demo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---- Microservices (single definition each; scaled via --scale flag) ----

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PORT: "3000"
      SERVICE_NAME: api-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  order-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: order-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  payment-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: payment-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  notification-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ---- Reverse proxy (resolves multi-replica api-gateway via Docker DNS) ----

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "3000:3000"
    volumes:
      - ../infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:
    driver: bridge
