      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: notification-service-3
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "3000:3000"
    volumes:
      - ../infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - api-gateway-3
    restart: unless-stopped

volumes:
  mongo_data:
