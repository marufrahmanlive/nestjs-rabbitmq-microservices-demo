version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: microservices-demo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway-1:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway-1
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PORT: "3000"
      SERVICE_NAME: api-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-gateway-2:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway-2
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PORT: "3000"
      SERVICE_NAME: api-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-gateway-3:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway-3
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PORT: "3000"
      SERVICE_NAME: api-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  order-service-1:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: order-service-1
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: order-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  order-service-2:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: order-service-2
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: order-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  order-service-3:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: order-service-3
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      MONGO_URI: mongodb://mongodb:27017/microservices-demo
      SERVICE_NAME: order-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  payment-service-1:
